name: Bug report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. `make dev`
        2. `curl ...`
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: GridTrace version (from `git describe --tags` or `/api/health`).
      placeholder: "0.1.0"
    validations:
      required: false
  - type: dropdown
    id: backend
    attributes:
      label: Storage backend
      options:
        - postgres
        - sqlite
        - memory
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Stack traces, error messages, or `docker compose logs` excerpts.
      render: shell
    validations:
      required: false
